name: shrimad_bhagavatam
description: "Shrimad Bhagavatam — a premium multilingual devotional scripture reading app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4

  # Local caching & preferences
  shared_preferences: ^2.3.2

  # Fonts
  google_fonts: ^6.2.1

  # Sharing
  #  share_plus:

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
